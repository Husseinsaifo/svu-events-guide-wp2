<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>اتصل بنا - دليل الجامعة الافتراضية</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body dir="rtl">

<header class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark container">
        <a class="navbar-brand fw-bold" href="index.html">
            دليل فعاليات الجامعة الافتراضية
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
                <li class="nav-item"><a class="nav-link" href="events.html">كل الفعاليات</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">عن الدليل</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">اتصل بنا</a></li>
            </ul>
        </div>
    </nav>
</header>

<main class="mt-4">
    <section class="container mb-4">
        <h2 class="section-title">اتصل بنا</h2>

        <!-- Alerts لرسائل النجاح/الفشل -->
        <div id="formAlert" class="alert d-none" role="alert"></div>

        <!-- نموذج التواصل -->
        <form id="contactForm" class="mt-3">
            <div class="mb-3">
                <label for="name" class="form-label">الاسم</label>
                <input type="text" id="name" class="form-control" placeholder="اكتب اسمك">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control" placeholder="example@mail.com">
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">الرسالة</label>
                <textarea id="message" class="form-control" rows="4"
                          placeholder="اكتب رسالتك هنا"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">إرسال</button>
        </form>

        <!-- معلومات تواصل بديلة -->
        <div class="mt-4">
            <h5>معلومات تواصل أخرى</h5>
            <p>بريد عام: info@svu-events.com</p>
            <p>حسابات السوشيال: Facebook / Twitter / Instagram</p>
        </div>
    </section>
</main>

<footer class="bg-dark text-white mt-5 py-3">
    <div class="container d-flex flex-column flex-md-row justify-content-between">
        <p class="mb-0">حقوق النشر © 2026 الجامعة الافتراضية السورية</p>
        <div class="social-links">
            <a href="#" class="text-white me-2">Facebook</a>
            <a href="#" class="text-white me-2">Twitter</a>
            <a href="#" class="text-white">Instagram</a>
        </div>
    </div>
</footer>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>
<script src="assets/js/main.js"></script>
</body>
</html>
